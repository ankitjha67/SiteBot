services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sitebot
      POSTGRES_PASSWORD: sitebot
      POSTGRES_DB: sitebot
    ports:
      - "5432:5432"
    volumes:
      - sitebot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitebot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &app_env
      DATABASE_URL: postgresql://sitebot:sitebot@db:5432/sitebot
      REDIS_URL: redis://redis:6379/0
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-admin-key}
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-openai}
      ANSWER_MODEL: ${ANSWER_MODEL:-claude-haiku-4-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-SiteBot <bot@example.com>}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MAP_JSON: ${STRIPE_PRICE_MAP_JSON:-}
    ports:
      - "8000:8000"

  worker:
    build: .
    command: ["sitebot", "worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app_env

volumes:
  sitebot_pgdata:
