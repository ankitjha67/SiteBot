name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sitebot
          POSTGRES_PASSWORD: sitebot
          POSTGRES_DB: sitebot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sitebot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sitebot:sitebot@localhost:5432/sitebot_test
      REDIS_URL: redis://localhost:6379/0
      # Small vectors keep the CI schema light; integration tests use
      # synthetic vectors so no embedding model is downloaded.
      EMBED_PROVIDER: local
      EMBED_DIM: 384
      ADMIN_API_KEY: ci-admin-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Unit + integration tests
        run: pytest -q

  eval-gate:
    # Answer-quality gate: index a tiny fixture site and require the
    # retrieval eval to pass. Catches chunking/retrieval regressions.
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sitebot
          POSTGRES_PASSWORD: sitebot
          POSTGRES_DB: sitebot_eval
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sitebot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sitebot:sitebot@localhost:5432/sitebot_eval
      EMBED_PROVIDER: local
      EMBED_DIM: 384
      ADMIN_API_KEY: ci-admin-key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5
      - name: Index fixture site and run retrieval eval
        run: |
          python scripts/ci_eval_fixture.py
          python -m sitebot.cli eval ci-fixture evals/ci-fixture.json --threshold 1.0
